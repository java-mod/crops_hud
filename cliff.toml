# git-cliff configuration
# Conventional commit prefix → 한국어 섹션 이름으로 그룹화

[changelog]
header = """
# 변경 이력

"""
body = """
{% if version %}\
## [{{ version }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## 미출시
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}\
{% if commit.breaking %} ⚠️{% endif %}

{% endfor %}
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false   # 컨벤셔널 형식이 아닌 커밋도 포함
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "✨ 새 기능"    },
  { message = "^fix",      group = "🐛 버그 수정"  },
  { message = "^perf",     group = "⚡ 성능 개선"  },
  { message = "^refactor", group = "♻️ 리팩토링"   },
  { message = "^docs",     group = "📝 문서"       },
  { message = "^chore",    group = "🔧 기타"       },
  { message = ".*",        group = "📦 변경 사항"  },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
